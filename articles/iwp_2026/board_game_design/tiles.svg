<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 240 240" width="240mm" height="240mm" 
     xmlns="http://www.w3.org/2000/svg">

  <!-- Document Title -->
  <title>Collection of 36 tiles 40mm</title>
  
  <!-- Metadata for laser cutter -->
  <defs>
    <style>
      .cut-line { stroke: #000000; stroke-width: 0.5mm; fill: none; }
      .board-border { stroke: #000000; stroke-width: 1mm; fill: none; }
    </style>
  </defs>

  <!-- Board background -->
  <rect x="0" y="0" width="240" height="240" class="board-border"/>
  
  <!-- Horizontal grid lines (spacing/cut lines) -->
  <line x1="0" y1="40" x2="240" y2="40" class="cut-line"/>
  <line x1="0" y1="80" x2="240" y2="80" class="cut-line"/>
  <line x1="0" y1="120" x2="240" y2="120" class="cut-line"/>
  <line x1="0" y1="160" x2="240" y2="160" class="cut-line"/>
  <line x1="0" y1="200" x2="240" y2="200" class="cut-line"/>
  
  <!-- Vertical grid lines (spacing/cut lines) -->
  <line x1="40" y1="0" x2="40" y2="240" class="cut-line"/>
  <line x1="80" y1="0" x2="80" y2="240" class="cut-line"/>
  <line x1="120" y1="0" x2="120" y2="240" class="cut-line"/>
  <line x1="160" y1="0" x2="160" y2="240" class="cut-line"/>
  <line x1="200" y1="0" x2="200" y2="240" class="cut-line"/>




</svg>