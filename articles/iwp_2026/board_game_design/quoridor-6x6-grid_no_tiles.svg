<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 270 270" width="270mm" height="270mm" 
     xmlns="http://www.w3.org/2000/svg">
  
  <!-- Document Title -->
  <title>Quoridor 6x6 Grid - 40mm Tiles, 5mm Spacing</title>
  
  <!-- Metadata for laser cutter -->
  <defs>
    <style>
      .tile-outline { stroke: #cccccc; stroke-width: 0.1mm; fill: none; }
      .cut-line { stroke: #000000; stroke-width: 2.5mm; fill: none; }
      .board-border { stroke: #000000; stroke-width: 1mm; fill: none; }
    </style>
  </defs>
  
  <!-- Board background -->
  <rect x="0" y="0" width="270" height="270" class="board-border"/>
  
  <!-- Horizontal grid lines (spacing/cut lines) -->
  <!-- Row separators - these are the 5mm black profiles for walls -->
  <line x1="0" y1="40" x2="270" y2="40" class="cut-line"/>
  <line x1="0" y1="85" x2="270" y2="85" class="cut-line"/>
  <line x1="0" y1="130" x2="270" y2="130" class="cut-line"/>
  <line x1="0" y1="175" x2="270" y2="175" class="cut-line"/>
  <line x1="0" y1="220" x2="270" y2="220" class="cut-line"/>
  <line x1="0" y1="265" x2="270" y2="265" class="cut-line"/>
  
  <!-- Vertical grid lines (spacing/cut lines) -->
  <!-- Column separators - these are the 5mm black profiles for walls -->
  <line x1="40" y1="0" x2="40" y2="270" class="cut-line"/>
  <line x1="85" y1="0" x2="85" y2="270" class="cut-line"/>
  <line x1="130" y1="0" x2="130" y2="270" class="cut-line"/>
  <line x1="175" y1="0" x2="175" y2="270" class="cut-line"/>
  <line x1="220" y1="0" x2="220" y2="270" class="cut-line"/>
  <line x1="265" y1="0" x2="265" y2="270" class="cut-line"/>
  
  
</svg>