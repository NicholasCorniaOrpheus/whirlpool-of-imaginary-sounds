<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 275 275" width="275mm" height="275mm" 
     xmlns="http://www.w3.org/2000/svg">
  
  <!-- Document Title -->
  <title>Quoridor 6x6 Grid - 40mm Tiles, 5mm Spacing</title>
  
  <!-- Metadata for laser cutter -->
  <defs>
    <style>
      .tile-outline { stroke: #cccccc; stroke-width: 0.1mm; fill: none; }
      .cut-line { stroke: #000000; stroke-width: 0.25mm; fill: none; }
      .board-border { stroke: #000000; stroke-width: 0.5mm; fill: none; }
    </style>
  </defs>
  
  <!-- Board background -->
  <rect x="0" y="0" width="275" height="275" class="board-border"/>
  
  <!-- Horizontal grid lines (spacing/cut lines) -->
  <!-- Row separators - these are the 5mm black profiles for walls -->
  <line x1="0" y1="40" x2="275" y2="40" class="cut-line"/>
  <line x1="0" y1="85" x2="275" y2="85" class="cut-line"/>
  <line x1="0" y1="130" x2="275" y2="130" class="cut-line"/>
  <line x1="0" y1="175" x2="275" y2="175" class="cut-line"/>
  <line x1="0" y1="220" x2="275" y2="220" class="cut-line"/>
  
  <!-- Vertical grid lines (spacing/cut lines) -->
  <!-- Column separators - these are the 5mm black profiles for walls -->
  <line x1="40" y1="0" x2="40" y2="275" class="cut-line"/>
  <line x1="85" y1="0" x2="85" y2="275" class="cut-line"/>
  <line x1="130" y1="0" x2="130" y2="275" class="cut-line"/>
  <line x1="175" y1="0" x2="175" y2="275" class="cut-line"/>
  <line x1="220" y1="0" x2="220" y2="275" class="cut-line"/>
  
  <!-- Tile outlines (light gray for visual reference - optional for PDF, can be ignored by laser cutter) -->
  <!-- Row 1 -->
  <rect x="0" y="0" width="40" height="40" class="tile-outline"/>
  <rect x="45" y="0" width="40" height="40" class="tile-outline"/>
  <rect x="90" y="0" width="40" height="40" class="tile-outline"/>
  <rect x="135" y="0" width="40" height="40" class="tile-outline"/>
  <rect x="180" y="0" width="40" height="40" class="tile-outline"/>
  <rect x="225" y="0" width="40" height="40" class="tile-outline"/>
  
  <!-- Row 2 -->
  <rect x="0" y="45" width="40" height="40" class="tile-outline"/>
  <rect x="45" y="45" width="40" height="40" class="tile-outline"/>
  <rect x="90" y="45" width="40" height="40" class="tile-outline"/>
  <rect x="135" y="45" width="40" height="40" class="tile-outline"/>
  <rect x="180" y="45" width="40" height="40" class="tile-outline"/>
  <rect x="225" y="45" width="40" height="40" class="tile-outline"/>
  
  <!-- Row 3 -->
  <rect x="0" y="90" width="40" height="40" class="tile-outline"/>
  <rect x="45" y="90" width="40" height="40" class="tile-outline"/>
  <rect x="90" y="90" width="40" height="40" class="tile-outline"/>
  <rect x="135" y="90" width="40" height="40" class="tile-outline"/>
  <rect x="180" y="90" width="40" height="40" class="tile-outline"/>
  <rect x="225" y="90" width="40" height="40" class="tile-outline"/>
  
  <!-- Row 4 -->
  <rect x="0" y="135" width="40" height="40" class="tile-outline"/>
  <rect x="45" y="135" width="40" height="40" class="tile-outline"/>
  <rect x="90" y="135" width="40" height="40" class="tile-outline"/>
  <rect x="135" y="135" width="40" height="40" class="tile-outline"/>
  <rect x="180" y="135" width="40" height="40" class="tile-outline"/>
  <rect x="225" y="135" width="40" height="40" class="tile-outline"/>
  
  <!-- Row 5 -->
  <rect x="0" y="180" width="40" height="40" class="tile-outline"/>
  <rect x="45" y="180" width="40" height="40" class="tile-outline"/>
  <rect x="90" y="180" width="40" height="40" class="tile-outline"/>
  <rect x="135" y="180" width="40" height="40" class="tile-outline"/>
  <rect x="180" y="180" width="40" height="40" class="tile-outline"/>
  <rect x="225" y="180" width="40" height="40" class="tile-outline"/>
  
  <!-- Row 6 -->
  <rect x="0" y="225" width="40" height="40" class="tile-outline"/>
  <rect x="45" y="225" width="40" height="40" class="tile-outline"/>
  <rect x="90" y="225" width="40" height="40" class="tile-outline"/>
  <rect x="135" y="225" width="40" height="40" class="tile-outline"/>
  <rect x="180" y="225" width="40" height="40" class="tile-outline"/>
  <rect x="225" y="225" width="40" height="40" class="tile-outline"/>
  
</svg>